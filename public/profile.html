<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile | Notes</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;display:grid;place-items:center;padding:24px;font-family:Arial,sans-serif;background:#f6f7fb;color:#172033}.card{width:100%;max-width:520px;padding:30px;border:1px solid #e2e8f0;border-radius:22px;background:#fff;box-shadow:0 18px 50px rgba(15,23,42,.08)}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:26px}.back{color:#4f46e5;text-decoration:none;font-weight:700}.logout{border:0;background:#fef2f2;color:#b91c1c;padding:10px 13px;border-radius:10px;font-weight:700;cursor:pointer}h1{margin-bottom:7px}.sub{color:#697386;margin-bottom:24px}label{display:block;margin-bottom:7px;font-size:14px;font-weight:700}.group{margin-bottom:17px}input{width:100%;padding:13px 14px;border:1px solid #dbe2ea;border-radius:11px;font-size:15px;outline:0}input:focus{border-color:#4f46e5;box-shadow:0 0 0 4px rgba(79,70,229,.1)}button[type=submit]{width:100%;padding:13px;border:0;border-radius:11px;background:#4f46e5;color:#fff;font-weight:700;cursor:pointer}.message{display:none;margin-top:16px;padding:12px;border-radius:10px;font-size:14px}.error{display:block;background:#fef2f2;color:#b91c1c}.success{display:block;background:#f0fdf4;color:#166534}.meta{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:20px 0}.meta div{padding:14px;border-radius:12px;background:#f8fafc}.meta span{display:block;color:#697386;font-size:12px;margin-bottom:5px}.meta strong{font-size:19px}
</style>
</head>
<body>
<main class="card">
<div class="top"><a class="back" href="dashboard.html">← Dashboard</a><button id="logout" class="logout">Log out</button></div>
<h1>My Profile</h1>
<p class="sub">View and update your account details.</p>
<div class="meta"><div><span>Notes</span><strong id="notesCount">—</strong></div><div><span>Rating</span><strong id="rating">—</strong></div></div>
<form id="form">
<div class="group"><label for="username">Username</label><input id="username" required></div>
<div class="group"><label for="email">Email</label><input id="email" type="email" required></div>
<button id="save" type="submit">Save changes</button>
<div id="message" class="message"></div>
</form>
</main>
<script>
const API_BASE_URL=window.location.origin;
const token=localStorage.getItem("token");
const username=document.getElementById("username");
const email=document.getElementById("email");
const notesCount=document.getElementById("notesCount");
const rating=document.getElementById("rating");
const message=document.getElementById("message");
const save=document.getElementById("save");
function logout(){localStorage.removeItem("token");window.location.replace("login.html")}
function show(text,type){message.textContent=text;message.className=`message ${type}`}
async function request(url,options={}) {
    const response=await fetch(url,{...options,headers:{...(options.headers||{}),Authorization:`Bearer ${token}`}});
    if(response.status===401){logout();return null}
    const text=await response.text();
    let data;try{data=JSON.parse(text)}catch{data={message:text}}
    if(!response.ok)throw new Error(data.message||"Request failed");
    return data;
}
async function load(){
    if(!token)return logout();
    try{
        const data=await request(`${API_BASE_URL}/user/profile`);
        if(!data)return;
        username.value=data.username||"";
        email.value=data.email||"";
        notesCount.textContent=Array.isArray(data.Notes)?data.Notes.length:0;
        rating.textContent=Number(data.Rating||0).toFixed(2);
    }catch(error){show(error.message,"error")}
}
document.getElementById("form").addEventListener("submit",async event=>{
    event.preventDefault();
    save.disabled=true;save.textContent="Saving...";
    try{
        const data=await request(`${API_BASE_URL}/user/profile/update`,{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({username:username.value.trim(),email:email.value.trim()})
        });
        if(data)show(data.message||"Profile updated","success");
    }catch(error){show(error.message,"error")}
    finally{save.disabled=false;save.textContent="Save changes"}
});
document.getElementById("logout").addEventListener("click",logout);
load();
</script>
</body>
</html>
