<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note Details | Notes</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary: #4f46e5;
            --purple: #7c3aed;
            --background: #f6f7fb;
            --surface: #ffffff;
            --text: #172033;
            --muted: #697386;
            --border: #e2e8f0;
            --danger: #b91c1c;
            --success: #166534;
            --warning: #b45309;
        }

        body {
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(99, 102, 241, 0.08), transparent 28%),
                var(--background);
        }

        button,
        textarea,
        a {
            font: inherit;
        }

        .page-layout {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 250px 1fr;
        }

        .sidebar {
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 28px 20px;
            border-right: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.93);
            backdrop-filter: blur(16px);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 8px;
            margin-bottom: 38px;
            font-size: 18px;
            font-weight: 800;
        }

        .brand-mark {
            width: 42px;
            height: 42px;
            display: grid;
            place-items: center;
            border-radius: 13px;
            background: linear-gradient(135deg, var(--primary), var(--purple));
            color: white;
            box-shadow: 0 10px 22px rgba(79, 70, 229, 0.23);
        }

        .nav-links {
            display: grid;
            gap: 8px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 13px 14px;
            border-radius: 12px;
            color: var(--muted);
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
        }

        .nav-link:hover,
        .nav-link.active {
            background: #eef2ff;
            color: var(--primary);
        }

        .nav-icon {
            width: 24px;
            text-align: center;
            font-size: 17px;
        }

        .sidebar-footer {
            margin-top: auto;
        }

        .logout-button {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 13px 14px;
            border: 1px solid transparent;
            border-radius: 12px;
            background: transparent;
            color: #64748b;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .logout-button:hover {
            border-color: #fecaca;
            background: #fef2f2;
            color: var(--danger);
        }

        .main-content {
            min-width: 0;
            padding: 34px 40px 50px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 26px;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .mobile-menu-button,
        .back-button {
            width: 42px;
            height: 42px;
            flex-shrink: 0;
            display: grid;
            place-items: center;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: white;
            color: var(--text);
            text-decoration: none;
            cursor: pointer;
        }

        .mobile-menu-button {
            display: none;
        }

        h1 {
            font-size: 29px;
            letter-spacing: -0.6px;
        }

        .open-pdf-button {
            display: none;
            align-items: center;
            justify-content: center;
            padding: 12px 16px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), var(--purple));
            color: white;
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
            box-shadow: 0 10px 24px rgba(79, 70, 229, 0.2);
        }

        .open-pdf-button.visible {
            display: inline-flex;
        }

        .message {
            display: none;
            margin-bottom: 18px;
            padding: 13px 15px;
            border-radius: 11px;
            font-size: 14px;
            line-height: 1.5;
        }

        .message.visible {
            display: block;
        }

        .message.error {
            border: 1px solid #fecaca;
            background: #fef2f2;
            color: var(--danger);
        }

        .message.success {
            border: 1px solid #bbf7d0;
            background: #f0fdf4;
            color: var(--success);
        }

        .loading-card {
            padding: 46px;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: white;
            text-align: center;
        }

        .spinner {
            width: 42px;
            height: 42px;
            margin: 0 auto 16px;
            border: 4px solid #e0e7ff;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .details-content {
            display: none;
        }

        .details-content.visible {
            display: block;
        }

        .details-grid {
            display: grid;
            grid-template-columns: minmax(0, 1.5fr) minmax(290px, 0.5fr);
            gap: 22px;
            align-items: start;
        }

        .main-column,
        .side-column {
            display: grid;
            gap: 22px;
        }

        .card {
            border: 1px solid var(--border);
            border-radius: 20px;
            background: var(--surface);
            box-shadow: 0 14px 40px rgba(15, 23, 42, 0.05);
        }

        .note-header {
            padding: 26px;
        }

        .user-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 22px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            display: grid;
            place-items: center;
            flex-shrink: 0;
            border-radius: 14px;
            background: #eef2ff;
            color: var(--primary);
            font-weight: 800;
        }

        .username {
            margin-bottom: 4px;
            font-size: 15px;
            font-weight: 700;
        }

        .email {
            color: var(--muted);
            font-size: 12px;
        }

        .note-title {
            margin-bottom: 13px;
            overflow-wrap: anywhere;
            font-size: 25px;
            line-height: 1.3;
            letter-spacing: -0.4px;
        }

        .meta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .meta-pill {
            padding: 8px 11px;
            border-radius: 999px;
            background: #f8fafc;
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
        }

        .rating-pill {
            background: #fffbeb;
            color: var(--warning);
        }

        .pdf-frame-card {
            overflow: hidden;
        }

        .pdf-frame {
            width: 100%;
            min-height: 690px;
            display: block;
            border: none;
            background: #f1f5f9;
        }

        .section-card {
            padding: 24px;
        }

        .section-title {
            margin-bottom: 17px;
            font-size: 18px;
        }

        .rating-buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 14px;
        }

        .rating-button {
            height: 44px;
            border: 1px solid var(--border);
            border-radius: 11px;
            background: white;
            color: #94a3b8;
            font-size: 21px;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .rating-button:hover,
        .rating-button.selected {
            border-color: #fbbf24;
            background: #fffbeb;
            color: #f59e0b;
        }

        .submit-rating {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 11px;
            background: var(--primary);
            color: white;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .submit-rating:disabled {
            cursor: not-allowed;
            background: #a5b4fc;
        }

        .rating-message {
            margin-top: 12px;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.5;
        }

        .comment-form {
            margin-bottom: 22px;
        }

        textarea {
            width: 100%;
            min-height: 105px;
            resize: vertical;
            padding: 13px 14px;
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            outline: none;
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .comment-form-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-top: 10px;
        }

        .character-count {
            color: var(--muted);
            font-size: 12px;
        }

        .comment-button {
            padding: 11px 15px;
            border: none;
            border-radius: 10px;
            background: var(--primary);
            color: white;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }

        .comment-button:disabled {
            cursor: not-allowed;
            background: #a5b4fc;
        }

        .comments-list {
            display: grid;
            gap: 13px;
        }

        .comment-item {
            padding: 15px;
            border: 1px solid var(--border);
            border-radius: 13px;
            background: #fbfcfe;
        }

        .comment-top {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 9px;
        }

        .comment-user {
            font-size: 13px;
            font-weight: 700;
        }

        .comment-email {
            margin-top: 3px;
            color: var(--muted);
            font-size: 11px;
        }

        .delete-comment {
            border: none;
            background: transparent;
            color: var(--danger);
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        .comment-message {
            color: #475569;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
        }

        .comments-status {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.5;
        }

        .share-button {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 11px;
            background: white;
            color: var(--text);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }

        .share-button:hover {
            border-color: #c7d2fe;
            color: var(--primary);
        }

        @media (max-width: 1000px) {
            .details-grid {
                grid-template-columns: 1fr;
            }

            .side-column {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 950px) {
            .page-layout {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: fixed;
                left: -270px;
                z-index: 20;
                width: 250px;
                transition: left 0.25s ease;
                box-shadow: 18px 0 45px rgba(15, 23, 42, 0.13);
            }

            .sidebar.open {
                left: 0;
            }

            .mobile-menu-button {
                display: grid;
            }

            .main-content {
                padding: 28px;
            }
        }

        @media (max-width: 650px) {
            .main-content {
                padding: 20px 16px 35px;
            }

            .topbar {
                align-items: flex-start;
                flex-direction: column;
            }

            .topbar-left {
                width: 100%;
            }

            h1 {
                font-size: 25px;
            }

            .open-pdf-button.visible {
                width: 100%;
            }

            .side-column {
                grid-template-columns: 1fr;
            }

            .pdf-frame {
                min-height: 520px;
            }

            .note-header,
            .section-card {
                padding: 20px;
            }

            .comment-form-footer {
                align-items: flex-end;
                flex-direction: column;
            }

            .comment-button {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="page-layout">
        <aside id="sidebar" class="sidebar">
            <div class="brand">
                <div class="brand-mark">N</div>
                <span>Notes</span>
            </div>

            <nav class="nav-links" aria-label="Main navigation">
                <a class="nav-link" href="dashboard.html">
                    <span class="nav-icon">⌂</span>
                    Dashboard
                </a>

                <a class="nav-link" href="my-notes.html">
                    <span class="nav-icon">▤</span>
                    My notes
                </a>

                <a class="nav-link" href="upload-note.html">
                    <span class="nav-icon">＋</span>
                    Upload note
                </a>

                <a class="nav-link active" href="explore.html">
                    <span class="nav-icon">⌕</span>
                    Explore
                </a>

                <a class="nav-link" href="profile.html">
                    <span class="nav-icon">◉</span>
                    Profile
                </a>
            </nav>

            <div class="sidebar-footer">
                <button id="logoutButton" class="logout-button" type="button">
                    <span class="nav-icon">↪</span>
                    Log out
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div class="topbar-left">
                    <button
                        id="menuButton"
                        class="mobile-menu-button"
                        type="button"
                        aria-label="Open navigation"
                    >
                        ☰
                    </button>

                    <a class="back-button" href="explore.html" aria-label="Back to explore">
                        ←
                    </a>

                    <h1>Note Details</h1>
                </div>

                <a
                    id="openPdfButton"
                    class="open-pdf-button"
                    href="#"
                    target="_blank"
                    rel="noopener noreferrer"
                >
                    Open PDF
                </a>
            </header>

            <div id="pageMessage" class="message" aria-live="polite"></div>

            <section id="loadingCard" class="loading-card">
                <div class="spinner"></div>
                <p>Loading note details...</p>
            </section>

            <section id="detailsContent" class="details-content">
                <div class="details-grid">
                    <div class="main-column">
                        <article class="card note-header">
                            <div class="user-row">
                                <div id="ownerAvatar" class="avatar">U</div>

                                <div>
                                    <p id="ownerName" class="username"></p>
                                    <p id="ownerEmail" class="email"></p>
                                </div>
                            </div>

                            <h2 id="noteTitle" class="note-title"></h2>

                            <div class="meta-row">
                                <span class="meta-pill">Public note</span>
                                <span id="averageRating" class="meta-pill rating-pill"></span>
                                <span id="createdDate" class="meta-pill"></span>
                            </div>
                        </article>

                        <article class="card pdf-frame-card">
                            <iframe
                                id="pdfFrame"
                                class="pdf-frame"
                                title="PDF note preview"
                            ></iframe>
                        </article>

                        <article class="card section-card">
                            <h2 class="section-title">
                                Comments
                                <span id="commentTotal"></span>
                            </h2>

                            <form id="commentForm" class="comment-form">
                                <textarea
                                    id="commentInput"
                                    maxlength="500"
                                    placeholder="Write a helpful comment..."
                                    required
                                ></textarea>

                                <div class="comment-form-footer">
                                    <span id="characterCount" class="character-count">
                                        0 / 500
                                    </span>

                                    <button
                                        id="commentButton"
                                        class="comment-button"
                                        type="submit"
                                    >
                                        Add comment
                                    </button>
                                </div>
                            </form>

                            <div id="commentsStatus" class="comments-status">
                                Loading comments...
                            </div>

                            <div id="commentsList" class="comments-list"></div>
                        </article>
                    </div>

                    <aside class="side-column">
                        <article class="card section-card">
                            <h2 class="section-title">Rate this note</h2>

                            <div id="ratingButtons" class="rating-buttons">
                                <button class="rating-button" type="button" data-rating="1">★</button>
                                <button class="rating-button" type="button" data-rating="2">★</button>
                                <button class="rating-button" type="button" data-rating="3">★</button>
                                <button class="rating-button" type="button" data-rating="4">★</button>
                                <button class="rating-button" type="button" data-rating="5">★</button>
                            </div>

                            <button
                                id="submitRatingButton"
                                class="submit-rating"
                                type="button"
                                disabled
                            >
                                Submit rating
                            </button>

                            <p id="ratingMessage" class="rating-message">
                                Select a rating between 1 and 5.
                            </p>
                        </article>

                        <article class="card section-card">
                            <h2 class="section-title">Share note</h2>

                            <button id="copyLinkButton" class="share-button" type="button">
                                Copy page link
                            </button>
                        </article>
                    </aside>
                </div>
            </section>
        </main>
    </div>

    <script>
        const API_BASE_URL = window.location.origin;
        const token = localStorage.getItem("token");
        const noteId = new URLSearchParams(window.location.search).get("id");

        const loadingCard = document.getElementById("loadingCard");
        const detailsContent = document.getElementById("detailsContent");
        const pageMessage = document.getElementById("pageMessage");

        const ownerAvatar = document.getElementById("ownerAvatar");
        const ownerName = document.getElementById("ownerName");
        const ownerEmail = document.getElementById("ownerEmail");
        const noteTitle = document.getElementById("noteTitle");
        const averageRating = document.getElementById("averageRating");
        const createdDate = document.getElementById("createdDate");
        const pdfFrame = document.getElementById("pdfFrame");
        const openPdfButton = document.getElementById("openPdfButton");

        const ratingButtons = Array.from(
            document.querySelectorAll(".rating-button")
        );
        const submitRatingButton = document.getElementById("submitRatingButton");
        const ratingMessage = document.getElementById("ratingMessage");

        const commentForm = document.getElementById("commentForm");
        const commentInput = document.getElementById("commentInput");
        const characterCount = document.getElementById("characterCount");
        const commentButton = document.getElementById("commentButton");
        const commentsList = document.getElementById("commentsList");
        const commentsStatus = document.getElementById("commentsStatus");
        const commentTotal = document.getElementById("commentTotal");

        const copyLinkButton = document.getElementById("copyLinkButton");
        const logoutButton = document.getElementById("logoutButton");
        const menuButton = document.getElementById("menuButton");
        const sidebar = document.getElementById("sidebar");

        let selectedRating = null;
        let currentUserId = null;
        let loadedNote = null;

        function redirectToLogin() {
            localStorage.removeItem("token");
            window.location.replace("login.html");
        }

        function showPageMessage(message, type) {
            pageMessage.textContent = message;
            pageMessage.className = `message visible ${type}`;
        }

        function hidePageMessage() {
            pageMessage.textContent = "";
            pageMessage.className = "message";
        }

        function decodeCurrentUserId(jwtToken) {
            try {
                const payloadPart = jwtToken.split(".")[1];
                const normalized = payloadPart
                    .replace(/-/g, "+")
                    .replace(/_/g, "/");

                const payload = JSON.parse(
                    decodeURIComponent(
                        atob(normalized)
                            .split("")
                            .map(function (character) {
                                return "%" + (
                                    "00" + character.charCodeAt(0).toString(16)
                                ).slice(-2);
                            })
                            .join("")
                    )
                );

                return payload.userID ? String(payload.userID) : null;
            } catch {
                return null;
            }
        }

        async function parseResponse(response) {
            const text = await response.text();

            try {
                return {
                    text,
                    data: JSON.parse(text)
                };
            } catch {
                return {
                    text,
                    data: null
                };
            }
        }

        function getFileName(url) {
            try {
                const parsedUrl = new URL(url);
                const pieces = parsedUrl.pathname.split("/");
                const rawName = pieces[pieces.length - 1];

                return rawName
                    ? decodeURIComponent(rawName)
                    : "Public note";
            } catch {
                return "Public note";
            }
        }

        function formatDate(value) {
            if (!value) {
                return "";
            }

            const date = new Date(value);

            if (Number.isNaN(date.getTime())) {
                return "";
            }

            return date.toLocaleDateString(undefined, {
                year: "numeric",
                month: "short",
                day: "numeric"
            });
        }

        async function findPublicNote() {
            const params = new URLSearchParams({
                page: "1",
                limit: "1000"
            });

            const response = await fetch(
                `${API_BASE_URL}/user/notes/search?${params.toString()}`,
                {
                    method: "GET",
                    headers: {
                        "Authorization": `Bearer ${token}`
                    }
                }
            );

            if (response.status === 401) {
                redirectToLogin();
                return null;
            }

            const result = await parseResponse(response);

            if (!response.ok) {
                throw new Error(
                    result.data?.message ||
                    result.data?.error ||
                    result.text ||
                    "Could not load note details."
                );
            }

            if (!result.data || !Array.isArray(result.data.notes)) {
                throw new Error("The backend returned invalid note data.");
            }

            return result.data.notes.find(function (note) {
                return note && String(note._id) === String(noteId);
            }) || null;
        }

        function displayNote(note) {
            loadedNote = note;

            const username = note.user?.username || "Unknown user";
            const email = note.user?.email || "Email unavailable";
            const numericRating = Number(note.rating);
            const dateText = formatDate(note.createdAt);

            ownerAvatar.textContent =
                username.trim().charAt(0).toUpperCase() || "U";

            ownerName.textContent = username;
            ownerEmail.textContent = email;
            noteTitle.textContent = getFileName(note.noteUrl);

            averageRating.textContent = Number.isFinite(numericRating)
                ? `★ ${numericRating.toFixed(2)}`
                : "★ 0.00";

            createdDate.textContent = dateText
                ? `Uploaded ${dateText}`
                : "Upload date unavailable";

            pdfFrame.src = note.noteUrl;
            openPdfButton.href = note.noteUrl;
            openPdfButton.classList.add("visible");

            loadingCard.style.display = "none";
            detailsContent.classList.add("visible");
        }

        function selectRating(value) {
            selectedRating = value;
            submitRatingButton.disabled = false;

            ratingButtons.forEach(function (button) {
                const buttonRating = Number(button.dataset.rating);
                button.classList.toggle(
                    "selected",
                    buttonRating <= selectedRating
                );
            });

            ratingMessage.textContent =
                `You selected ${selectedRating} out of 5.`;
        }

        async function submitRating() {
            if (!selectedRating || !loadedNote) {
                return;
            }

            submitRatingButton.disabled = true;
            submitRatingButton.textContent = "Submitting...";

            try {
                const response = await fetch(
                    `${API_BASE_URL}/user/notes/rate`,
                    {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": `Bearer ${token}`
                        },
                        body: JSON.stringify({
                            noteId: noteId,
                            rating: selectedRating
                        })
                    }
                );

                if (response.status === 401) {
                    redirectToLogin();
                    return;
                }

                const result = await parseResponse(response);

                if (!response.ok) {
                    throw new Error(
                        result.data?.message ||
                        result.data?.error ||
                        result.text ||
                        "Could not save your rating."
                    );
                }

                const updatedAverage = Number(
                    result.data?.noteAverageRating
                );

                if (Number.isFinite(updatedAverage)) {
                    averageRating.textContent =
                        `★ ${updatedAverage.toFixed(2)}`;
                }

                ratingMessage.textContent =
                    result.data?.message || "Rating saved successfully.";

            } catch (error) {
                ratingMessage.textContent = error instanceof TypeError
                    ? "Could not connect to the backend server."
                    : error.message;
            } finally {
                submitRatingButton.disabled = false;
                submitRatingButton.textContent = "Submit rating";
            }
        }

        function createCommentElement(comment) {
            const article = document.createElement("article");
            article.className = "comment-item";

            const top = document.createElement("div");
            top.className = "comment-top";

            const userBox = document.createElement("div");

            const username = document.createElement("p");
            username.className = "comment-user";
            username.textContent =
                comment.user?.username || "Unknown user";

            const email = document.createElement("p");
            email.className = "comment-email";
            email.textContent =
                comment.user?.email || "Email unavailable";

            userBox.appendChild(username);
            userBox.appendChild(email);
            top.appendChild(userBox);

            const commentUserId =
                comment.user?._id || comment.user;

            if (
                currentUserId &&
                commentUserId &&
                String(commentUserId) === String(currentUserId)
            ) {
                const deleteButton = document.createElement("button");
                deleteButton.className = "delete-comment";
                deleteButton.type = "button";
                deleteButton.textContent = "Delete";

                deleteButton.addEventListener("click", function () {
                    deleteComment(comment._id, article);
                });

                top.appendChild(deleteButton);
            }

            const message = document.createElement("p");
            message.className = "comment-message";
            message.textContent = comment.message || "";

            article.appendChild(top);
            article.appendChild(message);

            return article;
        }

        async function loadComments() {
            commentsStatus.textContent = "Loading comments...";
            commentsStatus.style.display = "block";
            commentsList.innerHTML = "";

            try {
                const response = await fetch(
                    `${API_BASE_URL}/user/comments/get`,
                    {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": `Bearer ${token}`
                        },
                        body: JSON.stringify({
                            noteId: noteId
                        })
                    }
                );

                if (response.status === 401) {
                    redirectToLogin();
                    return;
                }

                const result = await parseResponse(response);

                if (!response.ok) {
                    throw new Error(
                        result.data?.message ||
                        result.text ||
                        "Could not load comments."
                    );
                }

                const comments = Array.isArray(result.data?.comments)
                    ? result.data.comments
                    : [];

                commentTotal.textContent = `(${comments.length})`;

                if (comments.length === 0) {
                    commentsStatus.textContent =
                        "No comments yet. Be the first to comment.";
                    return;
                }

                commentsStatus.style.display = "none";

                comments.forEach(function (comment) {
                    commentsList.appendChild(
                        createCommentElement(comment)
                    );
                });

            } catch (error) {
                commentsStatus.textContent = error instanceof TypeError
                    ? "Could not connect to the backend server."
                    : error.message;
            }
        }

        async function addComment(event) {
            event.preventDefault();

            const message = commentInput.value.trim();

            if (!message) {
                showPageMessage(
                    "Please write a comment before submitting.",
                    "error"
                );
                return;
            }

            hidePageMessage();
            commentButton.disabled = true;
            commentButton.textContent = "Adding...";

            try {
                const response = await fetch(
                    `${API_BASE_URL}/user/comments/add`,
                    {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": `Bearer ${token}`
                        },
                        body: JSON.stringify({
                            noteId: noteId,
                            message: message
                        })
                    }
                );

                if (response.status === 401) {
                    redirectToLogin();
                    return;
                }

                const result = await parseResponse(response);

                if (!response.ok) {
                    throw new Error(
                        result.data?.message ||
                        result.text ||
                        "Could not add your comment."
                    );
                }

                commentInput.value = "";
                characterCount.textContent = "0 / 500";

                showPageMessage(
                    result.data?.message || "Comment added.",
                    "success"
                );

                await loadComments();

            } catch (error) {
                showPageMessage(
                    error instanceof TypeError
                        ? "Could not connect to the backend server."
                        : error.message,
                    "error"
                );
            } finally {
                commentButton.disabled = false;
                commentButton.textContent = "Add comment";
            }
        }

        async function deleteComment(commentId, commentElement) {
            const confirmed = window.confirm(
                "Delete this comment?"
            );

            if (!confirmed) {
                return;
            }

            try {
                const response = await fetch(
                    `${API_BASE_URL}/user/comments/delete`,
                    {
                        method: "DELETE",
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": `Bearer ${token}`
                        },
                        body: JSON.stringify({
                            commentId: commentId
                        })
                    }
                );

                if (response.status === 401) {
                    redirectToLogin();
                    return;
                }

                const result = await parseResponse(response);

                if (!response.ok) {
                    throw new Error(
                        result.data?.message ||
                        result.text ||
                        "Could not delete the comment."
                    );
                }

                commentElement.remove();
                await loadComments();

            } catch (error) {
                showPageMessage(
                    error instanceof TypeError
                        ? "Could not connect to the backend server."
                        : error.message,
                    "error"
                );
            }
        }

        async function initializePage() {
            if (!token) {
                redirectToLogin();
                return;
            }

            if (!noteId) {
                loadingCard.style.display = "none";
                showPageMessage(
                    "No note ID was provided. Return to Explore and select a note.",
                    "error"
                );
                return;
            }

            currentUserId = decodeCurrentUserId(token);

            try {
                const note = await findPublicNote();

                if (!note) {
                    throw new Error(
                        "This public note could not be found."
                    );
                }

                displayNote(note);
                await loadComments();

            } catch (error) {
                loadingCard.style.display = "none";

                showPageMessage(
                    error instanceof TypeError
                        ? "Could not connect to the backend server."
                        : error.message,
                    "error"
                );
            }
        }

        ratingButtons.forEach(function (button) {
            button.addEventListener("click", function () {
                selectRating(Number(button.dataset.rating));
            });
        });

        submitRatingButton.addEventListener("click", submitRating);
        commentForm.addEventListener("submit", addComment);

        commentInput.addEventListener("input", function () {
            characterCount.textContent =
                `${commentInput.value.length} / 500`;
        });

        copyLinkButton.addEventListener("click", async function () {
            try {
                await navigator.clipboard.writeText(window.location.href);
                copyLinkButton.textContent = "Link copied";

                setTimeout(function () {
                    copyLinkButton.textContent = "Copy page link";
                }, 1600);
            } catch {
                showPageMessage(
                    "Could not copy the page link.",
                    "error"
                );
            }
        });

        logoutButton.addEventListener("click", redirectToLogin);

        menuButton.addEventListener("click", function () {
            sidebar.classList.toggle("open");
        });

        document.addEventListener("click", function (event) {
            const clickedInsideSidebar = sidebar.contains(event.target);
            const clickedMenuButton = menuButton.contains(event.target);

            if (
                window.innerWidth <= 950 &&
                !clickedInsideSidebar &&
                !clickedMenuButton
            ) {
                sidebar.classList.remove("open");
            }
        });

        initializePage();
    </script>
</body>
</html>
