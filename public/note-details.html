<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Note Details | Notes</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;background:#f6f7fb;color:#172033;padding:28px}.page{max-width:1050px;margin:auto}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}.back,.open{padding:11px 14px;border-radius:10px;text-decoration:none;font-weight:700}.back{color:#4f46e5}.open{display:none;background:#4f46e5;color:#fff}.open.visible{display:inline-block}.grid{display:grid;grid-template-columns:1fr 320px;gap:20px}.card{padding:22px;border:1px solid #e2e8f0;border-radius:18px;background:#fff;box-shadow:0 12px 32px rgba(15,23,42,.05)}.owner{color:#697386;margin:8px 0 18px}.meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}.pill{padding:8px 10px;border-radius:999px;background:#eef2ff;color:#4338ca;font-size:12px;font-weight:700}iframe{width:100%;min-height:650px;border:0;border-radius:14px;background:#eef2f7}.stars{display:flex;gap:7px;margin:15px 0}.star{flex:1;height:42px;border:1px solid #e2e8f0;border-radius:9px;background:#fff;color:#94a3b8;font-size:20px;cursor:pointer}.star.selected{background:#fffbeb;color:#f59e0b;border-color:#fbbf24}.primary{width:100%;padding:12px;border:0;border-radius:10px;background:#4f46e5;color:#fff;font-weight:700;cursor:pointer}.primary:disabled{background:#a5b4fc}textarea{width:100%;min-height:95px;padding:12px;border:1px solid #dbe2ea;border-radius:10px;resize:vertical;margin:12px 0}.comments{display:grid;gap:10px;margin-top:15px}.comment{padding:13px;border-radius:11px;background:#f8fafc}.comment strong{font-size:13px}.comment p{margin-top:7px;color:#475569;font-size:13px;line-height:1.5}.delete{float:right;border:0;background:transparent;color:#b91c1c;cursor:pointer}.message{padding:18px;border-radius:14px;background:#fff;text-align:center;color:#697386}@media(max-width:800px){.grid{grid-template-columns:1fr}}@media(max-width:520px){body{padding:16px}.top{align-items:flex-start;flex-direction:column;gap:12px}iframe{min-height:500px}}
</style>
</head>
<body>
<main class="page">
<div class="top"><div><a class="back" href="javascript:history.back()">← Back</a><h1>Note Details</h1></div><a id="open" class="open" target="_blank" rel="noopener noreferrer">Open PDF</a></div>
<div id="state" class="message">Loading note...</div>
<section id="content" class="grid" style="display:none">
<div>
<article class="card">
<h2 id="title"></h2><p id="owner" class="owner"></p>
<div class="meta"><span id="visibility" class="pill"></span><span id="rating" class="pill"></span></div>
<iframe id="frame" title="PDF preview"></iframe>
</article>
<article class="card" style="margin-top:20px">
<h2>Comments <span id="count"></span></h2>
<form id="commentForm"><textarea id="commentInput" maxlength="500" placeholder="Write a comment..." required></textarea><button id="commentButton" class="primary" type="submit">Add comment</button></form>
<div id="commentsStatus" class="owner">Loading comments...</div><div id="comments" class="comments"></div>
</article>
</div>
<aside class="card">
<h2>Rate this note</h2>
<div class="stars"><button class="star" data-value="1">★</button><button class="star" data-value="2">★</button><button class="star" data-value="3">★</button><button class="star" data-value="4">★</button><button class="star" data-value="5">★</button></div>
<button id="rateButton" class="primary" disabled>Submit rating</button>
<p id="rateMessage" class="owner">Select a rating.</p>
</aside>
</section>
</main>
<script>
const API_BASE_URL=window.location.origin,token=localStorage.getItem("token"),noteId=new URLSearchParams(location.search).get("id");
const state=document.getElementById("state"),content=document.getElementById("content"),comments=document.getElementById("comments"),commentsStatus=document.getElementById("commentsStatus"),count=document.getElementById("count");
let selectedRating=0,currentUserId=null;
function logout(){localStorage.removeItem("token");location.replace("login.html")}
function decodeId(){try{return JSON.parse(atob(token.split(".")[1].replace(/-/g,"+").replace(/_/g,"/"))).userID?.toString()}catch{return null}}
function fileName(url){try{return decodeURIComponent(new URL(url).pathname.split("/").pop())||"Note"}catch{return"Note"}}
async function api(url,options={}){const response=await fetch(url,{...options,headers:{...(options.headers||{}),Authorization:`Bearer ${token}`}});if(response.status===401)return logout();const text=await response.text();let data;try{data=JSON.parse(text)}catch{data={message:text}}if(!response.ok)throw new Error(data.message||"Request failed");return data}
async function loadNote(){
 if(!token)return logout();if(!noteId){state.textContent="No note selected.";return}
 try{
  const note=await api(`${API_BASE_URL}/user/notes/${encodeURIComponent(noteId)}`);
  document.getElementById("title").textContent=fileName(note.noteUrl);
  document.getElementById("owner").textContent=`By ${note.user?.username||"Unknown"} (${note.user?.email||"No email"})`;
  document.getElementById("visibility").textContent=note.visibility;
  document.getElementById("rating").textContent=`★ ${Number(note.rating||0).toFixed(2)}`;
  document.getElementById("frame").src=note.noteUrl;
  const open=document.getElementById("open");open.href=note.noteUrl;open.classList.add("visible");
  state.style.display="none";content.style.display="grid";await loadComments();
 }catch(error){state.textContent=error.message}
}
async function loadComments(){
 comments.innerHTML="";commentsStatus.style.display="block";commentsStatus.textContent="Loading comments...";
 try{
  const data=await api(`${API_BASE_URL}/user/comments/get`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({noteId})});
  const list=Array.isArray(data.comments)?data.comments:[];count.textContent=`(${list.length})`;
  if(!list.length){commentsStatus.textContent="No comments yet.";return}
  commentsStatus.style.display="none";
  list.forEach(item=>{
   const box=document.createElement("div");box.className="comment";
   const name=document.createElement("strong");name.textContent=item.user?.username||"Unknown user";
   const message=document.createElement("p");message.textContent=item.message||"";
   const ownerId=(item.user?._id||item.user)?.toString();
   if(currentUserId&&ownerId===currentUserId){const del=document.createElement("button");del.className="delete";del.textContent="Delete";del.onclick=()=>deleteComment(item._id);box.appendChild(del)}
   box.append(name,message);comments.appendChild(box);
  });
 }catch(error){commentsStatus.textContent=error.message}
}
async function deleteComment(commentId){if(!confirm("Delete this comment?"))return;try{await api(`${API_BASE_URL}/user/comments/delete`,{method:"DELETE",headers:{"Content-Type":"application/json"},body:JSON.stringify({commentId})});loadComments()}catch(error){alert(error.message)}}
document.getElementById("commentForm").addEventListener("submit",async event=>{
 event.preventDefault();const input=document.getElementById("commentInput"),button=document.getElementById("commentButton"),message=input.value.trim();if(!message)return;
 button.disabled=true;try{await api(`${API_BASE_URL}/user/comments/add`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({noteId,message})});input.value="";loadComments()}catch(error){alert(error.message)}finally{button.disabled=false}
});
document.querySelectorAll(".star").forEach(button=>button.onclick=()=>{selectedRating=Number(button.dataset.value);document.querySelectorAll(".star").forEach(star=>star.classList.toggle("selected",Number(star.dataset.value)<=selectedRating));document.getElementById("rateButton").disabled=false});
document.getElementById("rateButton").onclick=async()=>{
 const button=document.getElementById("rateButton");button.disabled=true;
 try{const data=await api(`${API_BASE_URL}/user/notes/rate`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({noteId,rating:selectedRating})});document.getElementById("rating").textContent=`★ ${Number(data.noteAverageRating||0).toFixed(2)}`;document.getElementById("rateMessage").textContent=data.message||"Rating saved"}catch(error){document.getElementById("rateMessage").textContent=error.message}finally{button.disabled=false}
};
currentUserId=decodeId();loadNote();
</script>
</body>
</html>
