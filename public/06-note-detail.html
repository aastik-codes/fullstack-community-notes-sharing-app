<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Marginalia — Note</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,500&amp;family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<style>
  :root{
    --paper:#FAF7F0; --paper-deep:#F0EAD9; --ink:#1C1B19; --ink-soft:#3a3835;
    --sienna:#8B5E3C; --sienna-deep:#6e4a2e; --forest:#3D5A4C; --forest-deep:#2c453a;
    --rust:#A33B2E; --pencil:#6B6862; --line:#D8CFB8;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'Inter',sans-serif;}

  .topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 40px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--paper);z-index:10;}
  .brand{font-family:'Fraunces',serif;font-weight:600;font-size:20px;display:flex;align-items:center;gap:8px;}
  .brand .mark{width:26px;height:26px;border:1.5px solid var(--ink);border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:11px;transform:rotate(-4deg);}
  nav{display:flex;gap:28px;font-size:13.5px;font-weight:500;}
  nav a{color:var(--pencil);text-decoration:none;position:relative;padding:4px 0;}
  nav a.active{color:var(--ink);}
  nav a.active::after{content:"";position:absolute;left:0;right:0;bottom:-2px;height:2px;background:var(--sienna);border-radius:2px;}
  .avatar{width:34px;height:34px;border-radius:50%;background:var(--ink);color:var(--paper);display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:14px;font-weight:600;}

  .crumb{max-width:1180px;margin:0 auto;padding:18px 40px 0;font-size:12.5px;color:var(--pencil);}
  .crumb a{color:var(--pencil); text-decoration:none;}
  .crumb a:hover{color:var(--sienna-deep);}

  main{max-width:1180px;margin:0 auto;padding:18px 40px 90px;display:grid;grid-template-columns:1.5fr 1fr;gap:36px;}
  @media (max-width:880px){main{grid-template-columns:1fr;}}

  /* LEFT — viewer */
  .viewer-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;gap:14px;flex-wrap:wrap;}
  .viewer-head h1{font-family:'Fraunces',serif;font-style:italic;font-weight:500;font-size:27px;margin:0 0 8px;line-height:1.25;}
  .viewer-head .by{font-size:13px;color:var(--pencil);display:flex;align-items:center;gap:7px;}
  .mini-avatar{width:20px;height:20px;border-radius:50%;background:var(--paper-deep);border:1px solid var(--line);display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--ink-soft);font-family:'Fraunces',serif;}

  .status-pill{font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:500;padding:5px 11px;border-radius:20px;white-space:nowrap;text-transform:uppercase;letter-spacing:.04em;flex-shrink:0;}
  .status-pill.public{background:rgba(61,90,76,.12);color:var(--forest-deep);}

  .pdf-frame{
    background:#fff; border:1px solid var(--line); border-radius:14px; overflow:hidden;
    box-shadow:0 18px 40px -20px rgba(28,27,25,0.18);
  }
  .pdf-toolbar{
    display:flex; align-items:center; justify-content:space-between; padding:12px 16px;
    border-bottom:1px solid var(--line); background:var(--paper-deep);
  }
  .pdf-toolbar .left-tools{display:flex;align-items:center;gap:10px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-soft);}
  .pg-nav{display:flex;align-items:center;gap:6px;}
  .pg-nav button{width:26px;height:26px;border:1px solid var(--line);background:#fff;border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink-soft);}
  .pg-nav button:hover{border-color:var(--sienna);}
  .pdf-toolbar .right-tools{display:flex;gap:8px;}
  .tool-btn{
    width:30px;height:30px;border-radius:6px;border:1px solid var(--line);background:#fff;
    display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-soft);
  }
  .tool-btn:hover{border-color:var(--sienna);color:var(--sienna-deep);}
  .tool-btn svg{width:14px;height:14px;}

  /* mock pdf page render */
  .pdf-page{
    background:#fff; min-height:560px; padding:48px 56px; position:relative;
    background-image:
      linear-gradient(to right, transparent 0, transparent 100%);
  }
  .pdf-page .doc-title{font-family:'Fraunces',serif; font-weight:600; font-size:19px; margin:0 0 4px;}
  .pdf-page .doc-sub{font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--pencil); margin-bottom:26px; letter-spacing:.04em;}
  .fake-line{height:9px;background:var(--paper-deep);border-radius:2px;margin-bottom:11px;}
  .fake-line.w90{width:90%;}.fake-line.w100{width:100%;}.fake-line.w75{width:75%;}.fake-line.w60{width:60%;}.fake-line.w95{width:95%;}.fake-line.w40{width:40%;}
  .fake-heading{height:13px;width:48%;background:var(--line);border-radius:2px;margin:24px 0 14px;}
  .fake-diagram{
    margin:22px 0; height:120px; border:1.5px dashed var(--line); border-radius:8px;
    display:flex; align-items:center; justify-content:center; gap:18px; color:var(--pencil);
    font-family:'JetBrains Mono',monospace; font-size:10.5px;
  }
  .fake-box{width:62px;height:40px;border:1.5px solid var(--sienna); border-radius:5px; display:flex;align-items:center;justify-content:center; color:var(--sienna-deep); font-size:9px;}
  .fake-arrow{color:var(--pencil);}

  .pdf-toolbar.bottom{border-top:1px solid var(--line);border-bottom:none;justify-content:center;}
  .page-dots{display:flex;gap:5px;}
  .page-dots i{width:5px;height:5px;border-radius:50%;background:var(--line);}
  .page-dots i.active{background:var(--sienna); width:16px; border-radius:3px;}

  /* RIGHT — sidebar */
  .side-card{background:#fff;border:1px solid var(--line);border-radius:13px;padding:22px;margin-bottom:20px;}
  .side-card h3{font-family:'Fraunces',serif;font-weight:600;font-size:15.5px;margin:0 0 16px;}

  .rate-stars{display:flex;gap:6px;margin-bottom:10px;}
  .rate-stars svg{width:26px;height:26px;color:#e3ddcc;cursor:pointer;transition:color .15s ease, transform .15s ease;}
  .rate-stars svg:hover{transform:scale(1.12);}
  .rate-stars svg.filled{color:var(--forest);}
  .rate-sub{font-size:12px;color:var(--pencil);}

  .avg-row{display:flex;align-items:baseline;gap:10px;margin-bottom:4px;}
  .avg-row .num{font-family:'Fraunces',serif;font-size:32px;font-weight:600;}
  .avg-row .of5{font-size:13px;color:var(--pencil);}
  .rating-bars{margin-top:14px;display:flex;flex-direction:column;gap:6px;}
  .rbar{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--pencil);font-family:'JetBrains Mono',monospace;}
  .rbar .track{flex:1;height:6px;background:var(--paper-deep);border-radius:4px;overflow:hidden;}
  .rbar .fill{height:100%;background:var(--forest); border-radius:4px;}

  .access-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:9px 0;border-bottom:1px solid var(--line);}
  .access-row:last-child{border-bottom:none;}
  .access-row .nm{font-weight:500;}
  .access-row .em{color:var(--pencil); font-size:11.5px; font-family:'JetBrains Mono',monospace;}

  .download-btn{
    width:100%; background:var(--ink); color:var(--paper); border:none; border-radius:8px;
    padding:13px 0; font-size:13.5px; font-weight:600; cursor:pointer; margin-top:6px;
    transition:background .2s ease;
  }
  .download-btn:hover{background:var(--sienna-deep);}

  /* comments */
  .comments-section{margin-top:38px;}
  .comments-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:18px;}
  .comments-head h2{font-family:'Fraunces',serif;font-weight:600;font-size:19px;margin:0;}
  .comments-head span{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--pencil);}

  .comment-input{display:flex;gap:12px;margin-bottom:26px;}
  .comment-input textarea{
    flex:1; border:1.5px solid var(--line); border-radius:10px; padding:12px 14px; font-size:13.5px;
    font-family:'Inter',sans-serif; resize:none; min-height:44px; outline:none;
  }
  .comment-input textarea:focus{border-color:var(--sienna); box-shadow:0 0 0 3px rgba(139,94,60,0.1);}
  .comment-input button{
    background:var(--ink); color:var(--paper); border:none; border-radius:9px; padding:0 20px;
    font-size:13px; font-weight:600; cursor:pointer; flex-shrink:0;
  }
  .comment-input button:hover{background:var(--sienna-deep);}

  .comment-item{display:flex; gap:13px; padding:16px 0; border-bottom:1px solid var(--line);}
  .comment-item:last-child{border-bottom:none;}
  .comment-avatar{width:34px;height:34px;border-radius:50%;background:var(--paper-deep);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:600;font-size:13px;color:var(--ink-soft);flex-shrink:0;}
  .comment-body{flex:1;}
  .comment-head{display:flex;align-items:baseline;gap:8px;margin-bottom:5px;}
  .comment-head .nm{font-weight:600;font-size:13.5px;}
  .comment-head .tm{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--pencil);}
  .comment-text{font-size:13.5px;line-height:1.55;color:var(--ink-soft);}
  .comment-actions{margin-top:6px;display:flex;gap:14px;}
  .comment-actions span{font-size:11.5px;color:var(--pencil);cursor:pointer;}
  .comment-actions span:hover{color:var(--rust);}
</style>
</head>
<body>
<div class="topbar">
<div class="brand"><span class="mark">M.</span> Marginalia</div>
<nav>
<a href="#">Dashboard</a>
<a href="#">My notes</a>
<a class="active" href="#">Browse</a>
<a href="#">Profile</a>
</nav>
<div class="avatar">?</div>
</div>
<div class="crumb"><a href="/05-browse.html">Browse</a> / Loading note…</div>
<main>
<div>
<div class="viewer-head">
<div>
<h1>Loading note…</h1>
<div class="by"><span class="mini-avatar">?</span> Loading uploader…</div>
</div>
<span class="status-pill">—</span>
</div>
<div class="pdf-frame">
<div class="pdf-toolbar" style="display:none;">
<div class="left-tools">
<div class="pg-nav">
<button>‹</button>
<span>3 / 14</span>
<button>›</button>
</div>
</div>
<div class="right-tools">
<div class="tool-btn" title="Zoom out">−</div>
<div class="tool-btn" title="Zoom in">+</div>
<div class="tool-btn" title="Fullscreen"><svg fill="none" stroke="currentColor" stroke-width="2" viewbox="0 0 24 24"><path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3M3 16v3a2 2 0 002 2h3m11-5v3a2 2 0 01-2 2h-3"></path></svg></div>
</div>
</div>
<div class="pdf-page"><div style="padding:48px;text-align:center;color:var(--pencil);">Loading PDF…</div></div>
<div class="pdf-toolbar bottom" style="display:none;">
<div class="page-dots">
<i></i><i></i><i class="active"></i><i></i><i></i><i></i><i></i>
</div>
</div>
</div>
<div class="comments-section">
<div class="comments-head">
<h2>Comments</h2>
<span>0 comments</span>
</div>
<div class="comment-input">
<textarea placeholder="Leave a thought on this note…"></textarea>
<button>Post</button>
</div>
</div>
</div>
<aside>
<div class="side-card">
<h3>Rate this note</h3>
<div class="rate-stars"></div>
<p class="rate-sub">Choose a rating</p>
</div>
<div class="side-card">
<h3>Average rating</h3>
<div class="avg-row"><span class="num">0.0</span><span class="of5">out of 5 · 0 ratings</span></div>
<div class="rating-bars">
<div class="rbar">5 <div class="track"><div class="fill" style="width:0%;"></div></div> 0%</div>
<div class="rbar">4 <div class="track"><div class="fill" style="width:0%;"></div></div> 0%</div>
<div class="rbar">3 <div class="track"><div class="fill" style="width:0%;"></div></div> 0%</div>
<div class="rbar">2 <div class="track"><div class="fill" style="width:0%;"></div></div> 0%</div>
<div class="rbar">1 <div class="track"><div class="fill" style="width:0%;"></div></div> 0%</div>
</div>
</div>
<div class="side-card">
<h3>About the uploader</h3>
<div class="access-row">
<div>
<div class="nm">Loading…</div>
<div class="em"></div>
</div>
<span id="uploader-rating" style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--forest-deep);">★ 0.0</span>
</div>
<button class="download-btn">Download PDF</button>
</div>
</aside>
</main>
<script src="/js/06-note-detail.js" type="module"></script>
</body>
</html>
