<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Marginalia — Profile</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,500&amp;family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<style>
  :root{
    --paper:#FAF7F0; --paper-deep:#F0EAD9; --ink:#1C1B19; --ink-soft:#3a3835;
    --sienna:#8B5E3C; --sienna-deep:#6e4a2e; --forest:#3D5A4C; --forest-deep:#2c453a;
    --rust:#A33B2E; --pencil:#6B6862; --line:#D8CFB8;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'Inter',sans-serif;}

  .topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 40px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--paper);z-index:10;}
  .brand{font-family:'Fraunces',serif;font-weight:600;font-size:20px;display:flex;align-items:center;gap:8px;}
  .brand .mark{width:26px;height:26px;border:1.5px solid var(--ink);border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:11px;transform:rotate(-4deg);}
  nav{display:flex;gap:28px;font-size:13.5px;font-weight:500;}
  nav a{color:var(--pencil);text-decoration:none;position:relative;padding:4px 0;}
  nav a.active{color:var(--ink);}
  nav a.active::after{content:"";position:absolute;left:0;right:0;bottom:-2px;height:2px;background:var(--sienna);border-radius:2px;}
  .avatar{width:34px;height:34px;border-radius:50%;background:var(--ink);color:var(--paper);display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:14px;font-weight:600;}

  main{max-width:920px;margin:0 auto;padding:48px 40px 90px;}

  .profile-head{display:flex;align-items:center;gap:20px;margin-bottom:42px;}
  .big-avatar{
    width:74px;height:74px;border-radius:50%;background:var(--ink);color:var(--paper);
    display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:28px;font-weight:600;
    flex-shrink:0;
  }
  .profile-head h1{font-family:'Fraunces',serif;font-style:italic;font-weight:500;font-size:30px;margin:0 0 5px;}
  .profile-head p{margin:0;color:var(--pencil);font-size:13.5px;display:flex;gap:14px;align-items:center;}
  .profile-head .rating-chip{font-family:'JetBrains Mono',monospace;color:var(--forest-deep);background:rgba(61,90,76,.1);padding:2px 9px;border-radius:20px;font-size:11.5px;}

  .tab-row{display:flex;gap:6px;border-bottom:1px solid var(--line);margin-bottom:34px;}
  .tab-item{padding:12px 18px;font-size:13.5px;font-weight:600;color:var(--pencil);cursor:pointer;position:relative;}
  .tab-item.active{color:var(--ink);}
  .tab-item.active::after{content:"";position:absolute;left:18px;right:18px;bottom:-1px;height:2px;background:var(--sienna);border-radius:2px;}

  .panel-box{background:#fff;border:1px solid var(--line);border-radius:14px;padding:30px;margin-bottom:24px;}
  .panel-box h2{font-family:'Fraunces',serif;font-weight:600;font-size:18px;margin:0 0 22px;}

  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:6px;}
  @media (max-width:600px){.form-grid{grid-template-columns:1fr;}}
  label{display:block;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);margin-bottom:8px;}
  .field input{
    width:100%;padding:12px 14px;font-size:14px;border:1.5px solid var(--line);border-radius:8px;
    background:#fff;outline:none;font-family:'Inter',sans-serif;
  }
  .field input:focus{border-color:var(--sienna); box-shadow:0 0 0 3px rgba(139,94,60,0.12);}
  .field.full{grid-column:1 / -1;}
  .field .hint{font-size:11px;color:var(--pencil);margin-top:6px;font-family:'JetBrains Mono',monospace;}

  .save-row{display:flex;justify-content:flex-end;margin-top:20px;}
  .btn-primary{
    background:var(--ink);color:var(--paper);border:none;border-radius:8px;padding:12px 22px;
    font-size:13.5px;font-weight:600;cursor:pointer;transition:background .2s ease;
  }
  .btn-primary:hover{background:var(--sienna-deep);}

  /* access control */
  .note-select{margin-bottom:24px;}
  .note-select select{
    width:100%;padding:13px 14px;border:1.5px solid var(--line);border-radius:8px;font-size:14px;
    background:#fff;font-family:'Inter',sans-serif;cursor:pointer;appearance:none;
  }

  .vis-toggle{display:flex;gap:10px;margin-bottom:28px;}
  input[name="vischange"]{display:none;}
  .vt-option{
    flex:1;text-align:center;padding:13px 0;border:1.5px solid var(--line);border-radius:9px;
    cursor:pointer;font-size:13px;font-weight:600;color:var(--pencil);transition:all .2s ease;
  }
  #vc-public:checked ~ .vis-toggle label[for="vc-public"]{border-color:var(--forest-deep); background:rgba(61,90,76,.08); color:var(--forest-deep);}
  #vc-shared:checked ~ .vis-toggle label[for="vc-shared"]{border-color:var(--sienna-deep); background:rgba(139,94,60,.08); color:var(--sienna-deep);}
  #vc-private:checked ~ .vis-toggle label[for="vc-private"]{border-color:var(--rust); background:rgba(163,59,46,.07); color:var(--rust);}

  .access-list-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;}
  .access-list-head h3{font-size:14px;font-weight:600;margin:0;}
  .access-list-head span{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--pencil);}

  .add-access-row{display:flex;gap:10px;margin-bottom:18px;}
  .add-access-row input{
    flex:1;padding:11px 14px;border:1.5px solid var(--line);border-radius:8px;font-size:13.5px;outline:none;
  }
  .add-access-row input:focus{border-color:var(--sienna); box-shadow:0 0 0 3px rgba(139,94,60,0.1);}
  .add-access-row button{
    background:var(--forest);color:#fff;border:none;border-radius:8px;padding:0 18px;
    font-size:13px;font-weight:600;cursor:pointer;
  }
  .add-access-row button:hover{background:var(--forest-deep);}

  .access-grant{
    display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);
  }
  .access-grant:last-child{border-bottom:none;}
  .mini-avatar{width:30px;height:30px;border-radius:50%;background:var(--paper-deep);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:600;font-size:12.5px;color:var(--ink-soft);flex-shrink:0;}
  .grant-info{flex:1;}
  .grant-info .nm{font-weight:600;font-size:13.5px;}
  .grant-info .em{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--pencil);}
  .remove-link{font-size:12px;color:var(--rust);cursor:pointer;font-weight:500;}
  .remove-link:hover{text-decoration:underline;}

  .empty-hint{font-size:12.5px;color:var(--pencil);text-align:center;padding:20px 0;border:1.5px dashed var(--line);border-radius:10px;}
</style>
</head>
<body>
<div class="topbar">
<div class="brand"><span class="mark">M.</span> Marginalia</div>
<nav>
<a href="#">Dashboard</a>
<a href="#">My notes</a>
<a href="#">Browse</a>
<a class="active" href="#">Profile</a>
</nav>
<div class="avatar">?</div>
</div>
<main>
<div class="profile-head">
<div class="big-avatar">?</div>
<div>
<h1>Loading profile…</h1>
<p>Loading… <span class="rating-chip">★ 0.0 uploader rating</span></p>
</div>
</div>
<div class="tab-row">
<div class="tab-item active">Account details</div>
<div class="tab-item">Access control</div>
</div>
<div class="panel-box" id="account-panel">
<h2>Account details</h2>
<div class="form-grid">
<div class="field">
<label>Username</label>
<input type="text" value=""/>
</div>
<div class="field">
<label>Email</label>
<input type="email" value=""/>
<div class="hint">must contain "@"</div>
</div>
</div>
<div class="save-row">
<button class="btn-primary">Save changes</button>
</div>
</div>
<div class="panel-box" id="access-panel">
<h2>Manage access for a note</h2>
<div class="note-select">
<label>Select note</label>
<select><option value="">Loading notes…</option></select>
</div>
<label>Visibility</label>
<input id="vc-public" name="vischange" type="radio"/>
<input id="vc-private" name="vischange" type="radio"/>
<input id="vc-shared" name="vischange" type="radio"/>
<div class="vis-toggle">
<label class="vt-option" for="vc-public">Public</label>
<label class="vt-option" for="vc-private">Private</label>
<label class="vt-option" for="vc-shared">Shared</label>
</div>
<div class="access-list-head">
<h3>People with access</h3>
<span>0 people</span>
</div>
<div class="add-access-row">
<input placeholder="Add by email — e.g. friend@srmap.edu.in" type="text"/>
<button>Grant access</button>
</div>
<div class="empty-hint" style="padding:22px 0;color:var(--pencil);font-size:13px;text-align:center;">Select a note to manage access.</div></div>
</main>
<script src="/js/07-profile-access.js" type="module"></script>
</body>
</html>
