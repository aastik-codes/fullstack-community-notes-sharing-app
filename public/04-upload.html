<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marginalia — Upload a note</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAF7F0; --paper-deep:#F0EAD9; --ink:#1C1B19; --ink-soft:#3a3835;
    --sienna:#8B5E3C; --sienna-deep:#6e4a2e; --forest:#3D5A4C; --forest-deep:#2c453a;
    --rust:#A33B2E; --pencil:#6B6862; --line:#D8CFB8;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'Inter',sans-serif;}

  .topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 40px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--paper);z-index:10;}
  .brand{font-family:'Fraunces',serif;font-weight:600;font-size:20px;display:flex;align-items:center;gap:8px;}
  .brand .mark{width:26px;height:26px;border:1.5px solid var(--ink);border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:11px;transform:rotate(-4deg);}
  nav{display:flex;gap:28px;font-size:13.5px;font-weight:500;}
  nav a{color:var(--pencil);text-decoration:none;position:relative;padding:4px 0;}
  nav a.active{color:var(--ink);}
  nav a.active::after{content:"";position:absolute;left:0;right:0;bottom:-2px;height:2px;background:var(--sienna);border-radius:2px;}
  .avatar{width:34px;height:34px;border-radius:50%;background:var(--ink);color:var(--paper);display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:14px;font-weight:600;}

  main{max-width:760px;margin:0 auto;padding:48px 40px 90px;}
  .page-head{margin-bottom:36px;}
  .page-head h1{font-family:'Fraunces',serif;font-style:italic;font-weight:500;font-size:32px;margin:0 0 6px;}
  .page-head p{margin:0;color:var(--pencil);font-size:13.5px;}

  /* dropzone */
  .dropzone{
    border:2px dashed var(--line);
    border-radius:16px;
    background:#fff;
    padding:56px 30px;
    text-align:center;
    cursor:pointer;
    position:relative;
    transition:border-color .25s ease, background .25s ease, transform .2s ease;
    margin-bottom:28px;
  }
  .dropzone:hover{border-color:var(--sienna); background:rgba(139,94,60,.035);}
  .dropzone:active{transform:scale(.995);}

  .dz-icon{
    width:72px;height:88px;margin:0 auto 22px;position:relative;
    animation:hover-float 3.4s ease-in-out infinite;
  }
  @keyframes hover-float{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-7px) rotate(2deg);}}
  .dz-icon .sheet{
    position:absolute;inset:0;border:2px solid var(--ink);border-radius:6px;background:var(--paper);
  }
  .dz-icon .sheet::before{content:"";position:absolute;top:0;right:0;width:18px;height:18px;background:var(--paper-deep);border-bottom:2px solid var(--ink);border-left:2px solid var(--ink);}
  .dz-icon .lines{position:absolute; left:14px; right:14px; top:34px; display:flex; flex-direction:column; gap:6px;}
  .dz-icon .lines i{display:block;height:2.5px;background:var(--line);border-radius:2px;}
  .dz-icon .lines i:nth-child(2){width:70%;}
  .dz-icon .arrow{
    position:absolute; bottom:-10px; right:-10px; width:30px;height:30px; background:var(--sienna);
    border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff;
    box-shadow:0 4px 10px rgba(139,94,60,.4);
  }
  .dz-icon .arrow svg{width:14px;height:14px;}

  .dropzone h3{font-family:'Fraunces',serif;font-weight:600;font-size:19px;margin:0 0 6px;}
  .dropzone p{margin:0 0 18px;color:var(--pencil);font-size:13.5px;}
  .browse-btn{
    display:inline-block; background:var(--ink); color:var(--paper); padding:10px 20px;
    border-radius:7px; font-size:13px; font-weight:600; cursor:pointer;
  }
  .browse-btn:hover{background:var(--sienna-deep);}
  .file-rules{
    margin-top:20px;display:flex;gap:18px;justify-content:center;flex-wrap:wrap;
    font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--pencil);
  }
  .file-rules span{display:flex;align-items:center;gap:5px;}
  .file-rules .dot{width:5px;height:5px;border-radius:50%;background:var(--forest);}

  /* selected file preview (static demo state) */
  .file-selected{
    display:flex; align-items:center; gap:14px; background:#fff; border:1px solid var(--line);
    border-radius:12px; padding:16px 18px; margin-bottom:28px;
    animation:slidein .4s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes slidein{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
  .file-ico{width:38px;height:46px;border:1.5px solid var(--ink);border-radius:3px;position:relative;flex-shrink:0;background:#fff;}
  .file-ico::before{content:"";position:absolute;top:0;right:0;width:10px;height:10px;background:var(--paper);border-bottom:1.5px solid var(--ink);border-left:1.5px solid var(--ink);}
  .file-ico::after{content:"PDF";position:absolute;bottom:4px;left:0;right:0;text-align:center;font-family:'JetBrains Mono',monospace;font-size:6px;font-weight:700;letter-spacing:.02em;color:var(--rust);}
  .file-selected .info{flex:1;}
  .file-selected .name{font-weight:600;font-size:14px;margin-bottom:5px;}
  .progress-track{height:5px;background:var(--paper-deep);border-radius:4px;overflow:hidden;}
  .progress-fill{height:100%;width:72%;background:var(--forest);border-radius:4px;animation:fillup 1.6s ease forwards;}
  @keyframes fillup{from{width:0;}to{width:72%;}}
  .file-selected .size{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--pencil);margin-top:6px;}
  .remove-x{width:28px;height:28px;border-radius:6px;border:1px solid var(--line);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--pencil);flex-shrink:0;}
  .remove-x:hover{border-color:var(--rust);color:var(--rust);}

  /* visibility selector */
  .field-block{margin-bottom:28px;}
  .field-block > label{display:block;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);margin-bottom:12px;}

  .vis-options{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
  @media (max-width:560px){.vis-options{grid-template-columns:1fr;}}
  input[name="visibility"]{display:none;}
  .vis-card{
    border:1.5px solid var(--line); border-radius:12px; padding:18px 16px; cursor:pointer;
    background:#fff; transition:all .2s ease;
  }
  .vis-card:hover{border-color:var(--sienna);}
  .vis-card .vtitle{font-weight:600;font-size:14px;margin-bottom:5px;display:flex;align-items:center;gap:8px;}
  .vis-card .vdesc{font-size:12px;color:var(--pencil);line-height:1.5;}
  .vis-card .dot{width:9px;height:9px;border-radius:50%;}
  #v-public:checked ~ .vis-options label[for="v-public"],
  #v-private:checked ~ .vis-options label[for="v-private"],
  #v-shared:checked ~ .vis-options label[for="v-shared"]{
    border-color:var(--ink); background:var(--paper-deep); box-shadow:0 2px 8px rgba(28,27,25,0.08);
  }

  /* tags / note name */
  .text-field input{
    width:100%; padding:13px 14px; font-size:14.5px; border:1.5px solid var(--line); border-radius:8px;
    background:#fff; outline:none; font-family:'Inter',sans-serif;
  }
  .text-field input:focus{border-color:var(--sienna); box-shadow:0 0 0 3px rgba(139,94,60,0.12);}

  .submit-row{display:flex;gap:12px;margin-top:36px;}
  .btn-primary{
    flex:1; background:var(--ink); color:var(--paper); border:none; border-radius:8px;
    padding:15px 0; font-size:14.5px; font-weight:600; cursor:pointer; transition:background .2s ease, transform .15s ease;
  }
  .btn-primary:hover{background:var(--sienna-deep);}
  .btn-primary:active{transform:scale(.98);}
  .btn-ghost{
    padding:15px 24px; border:1.5px solid var(--line); border-radius:8px; background:#fff;
    font-size:14px; font-weight:600; color:var(--ink-soft); cursor:pointer;
  }
  .btn-ghost:hover{border-color:var(--rust); color:var(--rust);}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><span class="mark">M.</span> Marginalia</div>
  <nav>
    <a href="#">Dashboard</a>
    <a href="#">My notes</a>
    <a href="#">Browse</a>
    <a href="#">Profile</a>
  </nav>
  <div class="avatar">A</div>
</div>

<main>
  <div class="page-head">
    <h1>Upload a note</h1>
    <p>PDF only · max 20 MB per file</p>
  </div>

  <div class="dropzone">
    <div class="dz-icon">
      <div class="sheet"></div>
      <div class="lines"><i></i><i></i><i></i></div>
      <div class="arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 19V5M5 12l7-7 7 7"/></svg></div>
    </div>
    <h3>Drop your PDF here</h3>
    <p>or click to browse from your device</p>
    <span class="browse-btn">Choose file</span>
    <div class="file-rules">
      <span><i class="dot"></i> .pdf only</span>
      <span><i class="dot"></i> up to 20 MB</span>
      <span><i class="dot"></i> stored via Cloudinary</span>
    </div>
  </div>

  <div class="file-selected">
    <div class="file-ico"></div>
    <div class="info">
      <div class="name">Operating-Systems-Unit4-Scheduling.pdf</div>
      <div class="progress-track"><div class="progress-fill"></div></div>
      <div class="size">1.4 MB · uploading…</div>
    </div>
    <div class="remove-x">✕</div>
  </div>

  <div class="field-block">
    <label>Display name (optional)</label>
    <div class="text-field">
      <input type="text" placeholder="e.g. Operating Systems — Scheduling Algorithms">
    </div>
  </div>

  <div class="field-block">
    <label>Who can see this note?</label>

    <input type="radio" name="visibility" id="v-public">
    <input type="radio" name="visibility" id="v-private" checked>
    <input type="radio" name="visibility" id="v-shared">

    <div class="vis-options">
      <label class="vis-card" for="v-public">
        <div class="vtitle"><span class="dot" style="background:var(--forest);"></span> Public</div>
        <div class="vdesc">Anyone browsing Marginalia can find and read it.</div>
      </label>
      <label class="vis-card" for="v-private">
        <div class="vtitle"><span class="dot" style="background:var(--rust);"></span> Private</div>
        <div class="vdesc">Only you can view this note. Default for new uploads.</div>
      </label>
      <label class="vis-card" for="v-shared">
        <div class="vtitle"><span class="dot" style="background:var(--sienna);"></span> Shared</div>
        <div class="vdesc">Visible only to people you grant access to directly.</div>
      </label>
    </div>
  </div>

  <div class="submit-row">
    <button class="btn-ghost">Cancel</button>
    <button class="btn-primary">Upload note</button>
  </div>
</main>
<script type="module" src="/js/04-upload.js"></script>

</body>
</html>
