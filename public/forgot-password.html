<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Notes</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary: #4f46e5;
            --primary-dark: #4338ca;
            --text: #172033;
            --muted: #6b7280;
            --border: #dbe2ea;
            --surface: rgba(255, 255, 255, 0.94);
            --danger: #b91c1c;
            --success: #166534;
        }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: Arial, Helvetica, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 10% 15%, rgba(99, 102, 241, 0.2), transparent 26%),
                radial-gradient(circle at 90% 85%, rgba(192, 132, 252, 0.18), transparent 28%),
                linear-gradient(135deg, #f8fafc, #eef2ff 52%, #faf5ff);
        }

        .reset-card {
            width: 100%;
            max-width: 500px;
            padding: 38px;
            border: 1px solid rgba(148, 163, 184, 0.22);
            border-radius: 26px;
            background: var(--surface);
            box-shadow: 0 28px 80px rgba(30, 41, 59, 0.14);
            backdrop-filter: blur(16px);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 11px;
            margin-bottom: 30px;
            color: var(--primary);
            font-weight: 700;
        }

        .brand-mark {
            width: 42px;
            height: 42px;
            display: grid;
            place-items: center;
            border-radius: 13px;
            background: linear-gradient(135deg, var(--primary), #7c3aed);
            color: white;
            font-size: 18px;
            box-shadow: 0 10px 22px rgba(79, 70, 229, 0.24);
        }

        .step-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 26px;
        }

        .step {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #9ca3af;
            font-size: 13px;
            font-weight: 700;
        }

        .step-number {
            width: 28px;
            height: 28px;
            display: grid;
            place-items: center;
            border-radius: 50%;
            background: #eef2f7;
            color: #64748b;
        }

        .step.active {
            color: var(--primary);
        }

        .step.active .step-number,
        .step.done .step-number {
            background: var(--primary);
            color: white;
        }

        .step.done {
            color: var(--primary);
        }

        .step-line {
            flex: 1;
            height: 2px;
            background: #e5e7eb;
        }

        .step-line.active {
            background: var(--primary);
        }

        h1 {
            margin-bottom: 9px;
            font-size: 31px;
            line-height: 1.2;
            letter-spacing: -0.6px;
        }

        .subtitle {
            margin-bottom: 27px;
            color: var(--muted);
            font-size: 15px;
            line-height: 1.65;
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 700;
        }

        input {
            width: 100%;
            padding: 14px 15px;
            border: 1px solid var(--border);
            border-radius: 13px;
            background: white;
            color: var(--text);
            font-size: 15px;
            outline: none;
            transition: 0.2s ease;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.11);
        }

        input::placeholder {
            color: #9ca3af;
        }

        .password-wrapper {
            position: relative;
        }

        .password-wrapper input {
            padding-right: 70px;
        }

        .toggle-password {
            position: absolute;
            top: 50%;
            right: 14px;
            transform: translateY(-50%);
            border: none;
            background: transparent;
            color: var(--primary);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }

        .hint {
            margin-top: 7px;
            color: #8a94a5;
            font-size: 12px;
            line-height: 1.5;
        }

        .primary-button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 13px;
            background: linear-gradient(135deg, var(--primary), #7c3aed);
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 12px 24px rgba(79, 70, 229, 0.2);
            transition: 0.2s ease;
        }

        .primary-button:hover {
            transform: translateY(-1px);
            box-shadow: 0 15px 30px rgba(79, 70, 229, 0.27);
        }

        .primary-button:disabled {
            cursor: not-allowed;
            transform: none;
            background: #a5b4fc;
            box-shadow: none;
        }

        .secondary-button {
            width: 100%;
            margin-top: 11px;
            padding: 13px;
            border: 1px solid var(--border);
            border-radius: 13px;
            background: white;
            color: #475569;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .secondary-button:hover {
            border-color: #a5b4fc;
            color: var(--primary);
        }

        .message {
            display: none;
            margin-top: 18px;
            padding: 12px 14px;
            border-radius: 11px;
            font-size: 14px;
            line-height: 1.5;
        }

        .message.error {
            display: block;
            border: 1px solid #fecaca;
            background: #fef2f2;
            color: var(--danger);
        }

        .message.success {
            display: block;
            border: 1px solid #bbf7d0;
            background: #f0fdf4;
            color: var(--success);
        }

        .login-link {
            margin-top: 24px;
            text-align: center;
            color: var(--muted);
            font-size: 14px;
        }

        .login-link a {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        @media (max-width: 520px) {
            body {
                padding: 15px;
            }

            .reset-card {
                padding: 30px 22px;
                border-radius: 22px;
            }

            h1 {
                font-size: 27px;
            }

            .step span:last-child {
                display: none;
            }
        }
    </style>
</head>

<body>
    <main class="reset-card">
        <div class="brand">
            <div class="brand-mark">N</div>
            <span>Notes</span>
        </div>

        <div class="step-indicator">
            <div id="stepOneIndicator" class="step active">
                <div class="step-number">1</div>
                <span>Request token</span>
            </div>

            <div id="stepLine" class="step-line"></div>

            <div id="stepTwoIndicator" class="step">
                <div class="step-number">2</div>
                <span>Set password</span>
            </div>
        </div>

        <section id="requestSection" class="form-section active">
            <h1>Forgot your password?</h1>

            <p class="subtitle">
                Enter your registered email address. We will send a reset token to your email.
            </p>

            <form id="requestForm" novalidate>
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input
                        id="email"
                        name="email"
                        type="email"
                        placeholder="you@example.com"
                        autocomplete="email"
                        required
                    >
                </div>

                <button id="requestButton" class="primary-button" type="submit">
                    Send reset token
                </button>
            </form>
        </section>

        <section id="updateSection" class="form-section">
            <h1>Create a new password</h1>

            <p class="subtitle">
                Enter the token sent to your email and choose a new password.
            </p>

            <form id="updateForm" novalidate>
                <div class="form-group">
                    <label for="token">Reset token</label>
                    <input
                        id="token"
                        name="token"
                        type="text"
                        placeholder="Paste your reset token"
                        autocomplete="off"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="newPassword">New password</label>

                    <div class="password-wrapper">
                        <input
                            id="newPassword"
                            name="newPassword"
                            type="password"
                            placeholder="Minimum 6 characters"
                            autocomplete="new-password"
                            minlength="6"
                            required
                        >

                        <button
                            id="togglePassword"
                            class="toggle-password"
                            type="button"
                        >
                            Show
                        </button>
                    </div>

                    <p class="hint">
                        Use at least 6 characters.
                    </p>
                </div>

                <button id="updateButton" class="primary-button" type="submit">
                    Update password
                </button>

                <button id="backButton" class="secondary-button" type="button">
                    Use another email
                </button>
            </form>
        </section>

        <div id="message" class="message" aria-live="polite"></div>

        <p class="login-link">
            Remembered your password?
            <a href="login.html">Back to login</a>
        </p>
    </main>

    <script>
        const API_BASE_URL = window.location.origin;

        const requestForm = document.getElementById("requestForm");
        const updateForm = document.getElementById("updateForm");

        const requestSection = document.getElementById("requestSection");
        const updateSection = document.getElementById("updateSection");

        const emailInput = document.getElementById("email");
        const tokenInput = document.getElementById("token");
        const newPasswordInput = document.getElementById("newPassword");

        const requestButton = document.getElementById("requestButton");
        const updateButton = document.getElementById("updateButton");
        const backButton = document.getElementById("backButton");
        const togglePassword = document.getElementById("togglePassword");

        const stepOneIndicator = document.getElementById("stepOneIndicator");
        const stepTwoIndicator = document.getElementById("stepTwoIndicator");
        const stepLine = document.getElementById("stepLine");
        const messageBox = document.getElementById("message");

        function showMessage(message, type) {
            messageBox.textContent = message;
            messageBox.className = `message ${type}`;
        }

        function clearMessage() {
            messageBox.textContent = "";
            messageBox.className = "message";
        }

        function showStepTwo() {
            requestSection.classList.remove("active");
            updateSection.classList.add("active");

            stepOneIndicator.classList.remove("active");
            stepOneIndicator.classList.add("done");

            stepTwoIndicator.classList.add("active");
            stepLine.classList.add("active");

            clearMessage();
            tokenInput.focus();
        }

        function showStepOne() {
            updateSection.classList.remove("active");
            requestSection.classList.add("active");

            stepOneIndicator.className = "step active";
            stepTwoIndicator.className = "step";
            stepLine.className = "step-line";

            updateForm.reset();
            newPasswordInput.type = "password";
            togglePassword.textContent = "Show";

            clearMessage();
            emailInput.focus();
        }

        async function getResponseMessage(response) {
            const responseText = await response.text();

            try {
                const data = JSON.parse(responseText);
                return data.message || responseText;
            } catch {
                return responseText;
            }
        }

        togglePassword.addEventListener("click", function () {
            const passwordIsHidden = newPasswordInput.type === "password";

            newPasswordInput.type = passwordIsHidden ? "text" : "password";
            togglePassword.textContent = passwordIsHidden ? "Hide" : "Show";
        });

        backButton.addEventListener("click", showStepOne);

        requestForm.addEventListener("submit", async function (event) {
            event.preventDefault();
            clearMessage();

            const email = emailInput.value.trim();

            if (!email) {
                showMessage("Please enter your email address.", "error");
                return;
            }

            if (!emailInput.validity.valid) {
                showMessage("Please enter a valid email address.", "error");
                return;
            }

            requestButton.disabled = true;
            requestButton.textContent = "Sending token...";

            try {
                const response = await fetch(`${API_BASE_URL}/resetpass`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        email: email
                    })
                });

                const responseMessage = await getResponseMessage(response);

                if (!response.ok) {
                    throw new Error(
                        responseMessage || "Could not send the reset token."
                    );
                }

                /*
                    Your current backend sometimes returns HTTP 200 even when
                    the email is not registered, so we safely check the message.
                */
                if (
                    responseMessage &&
                    responseMessage.toLowerCase().includes("not registered")
                ) {
                    throw new Error(responseMessage);
                }

                showStepTwo();

                showMessage(
                    responseMessage || "Reset token sent to your email.",
                    "success"
                );

            } catch (error) {
                if (error instanceof TypeError) {
                    showMessage(
                        "Could not connect to the backend server.",
                        "error"
                    );
                } else {
                    showMessage(error.message, "error");
                }
            } finally {
                requestButton.disabled = false;
                requestButton.textContent = "Send reset token";
            }
        });

        updateForm.addEventListener("submit", async function (event) {
            event.preventDefault();
            clearMessage();

            const token = tokenInput.value.trim();
            const newPassword = newPasswordInput.value;

            if (!token || !newPassword) {
                showMessage(
                    "Please enter both the reset token and new password.",
                    "error"
                );
                return;
            }

            if (newPassword.length < 6) {
                showMessage(
                    "Password must contain at least 6 characters.",
                    "error"
                );
                return;
            }

            updateButton.disabled = true;
            updateButton.textContent = "Updating password...";

            try {
                const response = await fetch(`${API_BASE_URL}/updatepass`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        token: token,
                        newpass: newPassword
                    })
                });

                const responseMessage = await getResponseMessage(response);
                const lowerMessage = responseMessage.toLowerCase();

                /*
                    Your current backend also returns HTTP 200 for invalid or
                    expired tokens, so these messages are treated as errors.
                */
                if (
                    !response.ok ||
                    lowerMessage.includes("incorrect token") ||
                    lowerMessage.includes("token expired")
                ) {
                    throw new Error(
                        responseMessage || "Could not update the password."
                    );
                }

                showMessage(
                    responseMessage || "Password updated successfully.",
                    "success"
                );

                updateForm.reset();

                setTimeout(function () {
                    window.location.href = "login.html";
                }, 900);

            } catch (error) {
                if (error instanceof TypeError) {
                    showMessage(
                        "Could not connect to the backend server.",
                        "error"
                    );
                } else {
                    showMessage(error.message, "error");
                }
            } finally {
                updateButton.disabled = false;
                updateButton.textContent = "Update password";
            }
        });
    </script>
</body>
</html>
