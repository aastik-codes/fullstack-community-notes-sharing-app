<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Note | Notes</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;display:grid;place-items:center;padding:24px;font-family:Arial,sans-serif;background:#f6f7fb;color:#172033}.card{width:100%;max-width:650px;padding:30px;border:1px solid #e2e8f0;border-radius:22px;background:#fff;box-shadow:0 18px 50px rgba(15,23,42,.08)}.top{display:flex;justify-content:space-between;margin-bottom:25px}.back{color:#4f46e5;text-decoration:none;font-weight:700}h1{margin-bottom:7px}.sub{color:#697386;margin-bottom:24px}.drop{display:block;padding:34px;border:2px dashed #c7d2fe;border-radius:16px;background:#fafbff;text-align:center;cursor:pointer}.drop strong{display:block;margin-bottom:8px}.drop span{color:#697386;font-size:13px}input[type=file]{display:none}.group{margin-top:20px}label.title{display:block;margin-bottom:8px;font-size:14px;font-weight:700}select,input[type=email]{width:100%;padding:13px;border:1px solid #dbe2ea;border-radius:11px;font-size:14px;outline:0}.share-box{display:none}.share-box.visible{display:block}.lookup{display:grid;grid-template-columns:1fr 110px;gap:10px}.find{border:0;border-radius:11px;background:#eef2ff;color:#4f46e5;font-weight:700;cursor:pointer}.lookup-message{margin-top:8px;color:#697386;font-size:13px}.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}.chip{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:999px;background:#eef2ff;color:#4338ca;font-size:12px}.chip button{border:0;background:transparent;color:#b91c1c;cursor:pointer}.upload{width:100%;margin-top:22px;padding:14px;border:0;border-radius:12px;background:#4f46e5;color:#fff;font-weight:700;cursor:pointer}.upload:disabled{background:#a5b4fc}.message{display:none;margin-top:15px;padding:12px;border-radius:10px;font-size:14px}.error{display:block;background:#fef2f2;color:#b91c1c}.success{display:block;background:#f0fdf4;color:#166534}
</style>
</head>
<body>
<main class="card">
<div class="top"><a class="back" href="dashboard.html">← Dashboard</a><a class="back" href="received.html">Received notes</a></div>
<h1>Upload Note</h1><p class="sub">Upload a PDF and choose who can access it.</p>
<form id="form">
<label class="drop" for="file"><strong id="fileLabel">Choose a PDF</strong><span>PDF only, maximum 20 MB</span></label>
<input id="file" type="file" accept=".pdf,application/pdf" required>
<div class="group"><label class="title" for="visibility">Visibility</label><select id="visibility"><option value="private">Private</option><option value="public">Public</option><option value="shared">Shared with selected users</option></select></div>
<div id="shareBox" class="group share-box">
<label class="title" for="email">Add users by email</label>
<div class="lookup"><input id="email" type="email" placeholder="user@example.com"><button id="find" class="find" type="button">Find user</button></div>
<p id="lookupMessage" class="lookup-message">Enter an exact registered email.</p>
<div id="chips" class="chips"></div>
</div>
<button id="upload" class="upload" type="submit">Upload note</button>
<div id="message" class="message"></div>
</form>
</main>
<script>
const API_BASE_URL=window.location.origin;
const token=localStorage.getItem("token");
const file=document.getElementById("file"),fileLabel=document.getElementById("fileLabel"),visibility=document.getElementById("visibility"),shareBox=document.getElementById("shareBox"),email=document.getElementById("email"),find=document.getElementById("find"),lookupMessage=document.getElementById("lookupMessage"),chips=document.getElementById("chips"),upload=document.getElementById("upload"),message=document.getElementById("message");
const sharedUsers=new Map();
function logout(){localStorage.removeItem("token");window.location.replace("login.html")}
function show(text,type){message.textContent=text;message.className=`message ${type}`}
function renderUsers(){chips.innerHTML="";sharedUsers.forEach((user,key)=>{const chip=document.createElement("span");chip.className="chip";chip.textContent=user.email;const remove=document.createElement("button");remove.type="button";remove.textContent="×";remove.onclick=()=>{sharedUsers.delete(key);renderUsers()};chip.appendChild(remove);chips.appendChild(chip)})}
file.addEventListener("change",()=>{fileLabel.textContent=file.files[0]?.name||"Choose a PDF"});
visibility.addEventListener("change",()=>shareBox.classList.toggle("visible",visibility.value==="shared"));
find.addEventListener("click",async()=>{
    const value=email.value.trim().toLowerCase();
    if(!value){lookupMessage.textContent="Enter an email first.";return}
    find.disabled=true;lookupMessage.textContent="Checking...";
    try{
        const response=await fetch(`${API_BASE_URL}/user/find-by-email?email=${encodeURIComponent(value)}`,{headers:{Authorization:`Bearer ${token}`}});
        if(response.status===401)return logout();
        const data=await response.json();
        if(!response.ok)throw new Error(data.message||"No user found");
        sharedUsers.set(data._id,data);renderUsers();email.value="";lookupMessage.textContent=`Found: ${data.username} — ${data.email}`;
    }catch(error){lookupMessage.textContent=error.message}
    finally{find.disabled=false}
});
document.getElementById("form").addEventListener("submit",async event=>{
    event.preventDefault();
    if(!token)return logout();
    const selected=file.files[0];
    if(!selected)return show("Select a PDF first.","error");
    if(selected.size>20*1024*1024)return show("File must be 20 MB or smaller.","error");
    if(visibility.value==="shared"&&sharedUsers.size===0)return show("Add at least one user.","error");
    const body=new FormData();
    body.append("note",selected);
    body.append("visibility",visibility.value);
    body.append("sharedEmails",JSON.stringify([...sharedUsers.values()].map(user=>user.email)));
    upload.disabled=true;upload.textContent="Uploading...";
    try{
        const response=await fetch(`${API_BASE_URL}/user/upload`,{method:"POST",headers:{Authorization:`Bearer ${token}`},body});
        if(response.status===401)return logout();
        const data=await response.json();
        if(!response.ok)throw new Error(data.message||"Upload failed");
        show("Note uploaded successfully.","success");
        document.getElementById("form").reset();sharedUsers.clear();renderUsers();shareBox.classList.remove("visible");fileLabel.textContent="Choose a PDF";
    }catch(error){show(error.message,"error")}
    finally{upload.disabled=false;upload.textContent="Upload note"}
});
if(!token)logout();
</script>
</body>
</html>
